<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Official Community of PSG Institue of Technology and Applied Research
    </title>
    <meta
      name="description"
      content="Official PSG Institute of Technology and Applied Research Alumni Association Portal. Connect with alumni, explore events, career opportunities, and stay updated with PSG iTech Community."
    />
    <meta
      name="keywords"
      content="PSG iTech Alumni, PSG Institue of Technology and Research, PSG iTech, Coimbatore Alumni Network, PSG Events."
    />
    <meta name="author" content="PSG iTech Alumni Association" />

    <!--Robots-->
    <meta name="robots" content="index, follow" />

    <!--Canonical-->
    <link rel="canonical" href="https://alumni.psgitech.ac.in" />

    <!--Favicon-->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!--Theme color (Mobile browsers)-->
    <meta name="theme-color" content="#0f172a" />

    <!--Open Graph (Facebbok, LinkedIn)-->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PSG iTech Alumni Association" />
    <meta
      property="og:description"
      content="Connect with PSG iTech alumni, attend events, and grow your professional network."
    />
    <meta
      property="og:image"
      content="https://alumni.psgitech.ac.in/og-image.png"
    />
    <meta property="og:url" content="https://alumni.psgitech.ac.in/" />
    <meta property="og:site_name" content="PSG iTech Alumni Association" />

    <!--Twitter Card-->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PSG iTech Alumni Association" />
    <meta
      name="twitter:description"
      content="Join PSG iTech Alumni Association Network and Stay Connected."
    />
    <meta
      name="twitter:image"
      content="https://alumni.psgitech.ac.in/og-image.png"
    />

    <!--Performance Optimization-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />

    <!--Example Google Font (optional)-->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />

    <!-- Preload Important Assets -->
    <link rel="preload" href="/psgitech.png" as="image" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/psgitech.png" />

    <!-- Manifest (PWA support) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "PSG iTech Alumni Association",
        "url": "https://alumni.psgitech.ac.in",
        "logo": "https://alumni.psgitech.ac.in/logo.png",
        "sameAs": ["https://www.linkedin.com/", "https://www.facebook.com/"]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
